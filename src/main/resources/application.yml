spring:
  application:
    name: hhplus
  profiles:
    active: test
  datasource:
    name: HangHaePlusDataSource
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 3
      connection-timeout: 10000
      max-lifetime: 60000
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    generate-ddl: false
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        timezone.default_storage: NORMALIZE_UTC
      jdbc.time_zone: UTC

  logging:
    level:
    org.hibernate.SQL: DEBUG        # 실행 SQL 출력
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE  # 파라미터 값 바인딩 로그
    org.springframework.data.jpa.repository.query: DEBUG  # JPA Repository 쿼리 로그


---
spring.config.activate.on-profile: local, test

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hhplus?characterEncoding=UTF-8&serverTimezone=UTC
    username: application
    password: application